<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <defs>
    <radialGradient id="bgGrad" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#1a0010"/>
      <stop offset="100%" stop-color="#050505"/>
    </radialGradient>
    <linearGradient id="pinkGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#f472b6"/>
      <stop offset="100%" stop-color="#db2777"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2.5" result="coloredBlur"/>
      <feMerge><feMergeNode in="coloredBlur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background circle -->
  <circle cx="100" cy="100" r="98" fill="url(#bgGrad)" stroke="#f472b6" stroke-width="0.5" opacity="0.6"/>

  <!-- Outer ring -->
  <circle cx="100" cy="100" r="88" fill="none" stroke="url(#pinkGrad)" stroke-width="1" stroke-dasharray="4 6" opacity="0.5"/>

  <!-- Eye / lens shape -->
  <ellipse cx="100" cy="100" rx="40" ry="24" fill="none" stroke="#f472b6" stroke-width="1.5" filter="url(#glow)" opacity="0.9"/>
  <ellipse cx="100" cy="100" rx="40" ry="24" fill="none" stroke="#f472b6" stroke-width="0.5" opacity="0.3"/>

  <!-- Iris -->
  <circle cx="100" cy="100" r="13" fill="none" stroke="url(#pinkGrad)" stroke-width="1.5" filter="url(#glow)"/>

  <!-- Pupil -->
  <circle cx="100" cy="100" r="5" fill="#f472b6" opacity="0.9" filter="url(#glow)"/>

  <!-- Scan lines through eye -->
  <line x1="62" y1="100" x2="78" y2="100" stroke="#f472b6" stroke-width="0.8" opacity="0.5"/>
  <line x1="122" y1="100" x2="138" y2="100" stroke="#f472b6" stroke-width="0.8" opacity="0.5"/>

  <!-- Corner brackets -->
  <path d="M30 30 L30 45 M30 30 L45 30" stroke="#f472b6" stroke-width="1.5" fill="none" opacity="0.7" stroke-linecap="round"/>
  <path d="M170 30 L170 45 M170 30 L155 30" stroke="#f472b6" stroke-width="1.5" fill="none" opacity="0.7" stroke-linecap="round"/>
  <path d="M30 170 L30 155 M30 170 L45 170" stroke="#f472b6" stroke-width="1.5" fill="none" opacity="0.7" stroke-linecap="round"/>
  <path d="M170 170 L170 155 M170 170 L155 170" stroke="#f472b6" stroke-width="1.5" fill="none" opacity="0.7" stroke-linecap="round"/>

  <!-- DESCU text -->
  <text x="100" y="148" font-family="'Courier New', monospace" font-size="18" font-weight="700"
    fill="url(#pinkGrad)" text-anchor="middle" letter-spacing="6" filter="url(#glow)">DESCU</text>

  <!-- Agent subtext -->
  <text x="100" y="162" font-family="'Courier New', monospace" font-size="7"
    fill="#f472b6" text-anchor="middle" letter-spacing="3" opacity="0.6">AGENT</text>

  <!-- Top label -->
  <text x="100" y="60" font-family="'Courier New', monospace" font-size="6"
    fill="#f472b6" text-anchor="middle" letter-spacing="2" opacity="0.45">SURVEILLANCE · v1.0</text>
</svg>